# Generated by monup — https://github.com/YusufDrymz/monup
groups:
    - name: monup-rabbitmq
      rules:
        - alert: RabbitmqDown
          expr: up{job="rabbitmq"} == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: RabbitMQ instance {{ $labels.instance }} is down (or rabbitmq_prometheus plugin is not enabled)
        - alert: RabbitmqHighMemory
          expr: rabbitmq_process_resident_memory_bytes / rabbitmq_resident_memory_limit_bytes > 0.9
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: RabbitMQ {{ $labels.instance }} memory usage above 90% of its limit
