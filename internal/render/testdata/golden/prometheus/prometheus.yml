# Generated by monup — https://github.com/YusufDrymz/monup
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]
  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          monup_service: "postgres"
  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          monup_service: "redis"
  - job_name: rabbitmq
    static_configs:
      - targets: ["mq:15692"]
        labels:
          monup_service: "rabbitmq"
