# Generated by monup — https://github.com/YusufDrymz/monup
name: monup

services:
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: monup-prometheus
    labels:
      monup.managed: "true"
    volumes:
      - "./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro"
      - "./prometheus/rules:/etc/prometheus/rules:ro"
      - "prometheus-data:/prometheus"
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - monup
      - myapp_default
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.4
    container_name: monup-grafana
    labels:
      monup.managed: "true"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${MONUP_GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_SECURITY_ADMIN_USER: "${MONUP_GRAFANA_ADMIN_USER:-admin}"
    volumes:
      - "./grafana/provisioning:/etc/grafana/provisioning:ro"
      - "./grafana/dashboards:/var/lib/grafana/dashboards:ro"
      - "grafana-data:/var/lib/grafana"
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - monup
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: monup-node-exporter
    labels:
      monup.managed: "true"
    command:
      - "--path.rootfs=/host"
    pid: host
    volumes:
      - "/:/host:ro"
    networks:
      - monup
    restart: unless-stopped

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    container_name: monup-postgres-exporter
    labels:
      monup.managed: "true"
    environment:
      DATA_SOURCE_NAME: "postgresql://${MONUP_PG_USER}:${MONUP_PG_PASSWORD}@myapp-db:5432/postgres?sslmode=disable"
    networks:
      - monup
      - myapp_default
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:v1.61.0
    container_name: monup-redis-exporter
    labels:
      monup.managed: "true"
    environment:
      REDIS_ADDR: "redis://host.docker.internal:16379"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - monup
    restart: unless-stopped

networks:
  monup: {}
  myapp_default:
    external: true

volumes:
  grafana-data: {}
  prometheus-data: {}
