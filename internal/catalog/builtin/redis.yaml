name: redis
match:
  images: ["redis", "valkey", "bitnami/redis", "redis/redis-stack", "redis/redis-stack-server"]
  ports: [6379]
exporter:
  image: oliver006/redis_exporter:v1.61.0
  port: 9121
  env:
    REDIS_ADDR: "redis://{{target}}"
alerts:
  - alert: RedisDown
    expr: redis_up == 0
    for: 1m
    labels: {severity: critical}
    annotations:
      summary: "Redis instance {{ $labels.instance }} is down"
  - alert: RedisOutOfMemory
    expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9 and redis_memory_max_bytes > 0
    for: 5m
    labels: {severity: warning}
    annotations:
      summary: "Redis {{ $labels.instance }} memory usage above 90% of maxmemory"
  - alert: RedisTooManyEvictions
    expr: rate(redis_evicted_keys_total[5m]) > 0
    for: 10m
    labels: {severity: warning}
    annotations:
      summary: "Redis {{ $labels.instance }} is evicting keys (memory pressure)"
dashboard:
  title: Redis
  panels:
    - {title: "Up", expr: "redis_up", type: stat}
    - {title: "Connected clients", expr: "redis_connected_clients"}
    - {title: "Commands/s", expr: "rate(redis_commands_processed_total[5m])", unit: ops}
    - {title: "Memory used", expr: "redis_memory_used_bytes", unit: bytes}
    - {title: "Keyspace hit ratio", expr: "rate(redis_keyspace_hits_total[5m]) / (rate(redis_keyspace_hits_total[5m]) + rate(redis_keyspace_misses_total[5m]))", unit: percentunit}
    - {title: "Evicted keys/s", expr: "rate(redis_evicted_keys_total[5m])", unit: ops}
